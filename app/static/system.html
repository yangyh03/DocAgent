<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DocAgent 系统说明</title>
    <link rel="icon" href="/static/assets/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/static/styles.css?v=20260703-toc-v1" />
  </head>
  <body class="system-page">
    <main class="system-shell">
      <header class="system-topbar">
        <div class="brand">
          <img class="brand-mark" src="/static/assets/logo.svg" alt="DocAgent logo" />
          <div>
            <h1>DocAgent</h1>
            <p>System Guide</p>
          </div>
        </div>
        <nav class="topbar-actions" aria-label="系统说明导航">
          <a class="ghost-button" href="/">返回工作台</a>
          <a class="ghost-button" href="/docs" target="_blank" rel="noreferrer">API Docs</a>
        </nav>
      </header>

      <div class="system-doc-layout">
        <aside class="system-toc-card" aria-label="系统说明目录">
          <div class="system-toc-title">目录预览</div>
          <nav id="systemDocToc" class="system-toc">
            <span class="system-toc-empty">等待文档加载</span>
          </nav>
        </aside>

        <article class="system-doc-card">
          <div id="systemDocStatus" class="system-doc-status">正在加载系统说明...</div>
          <div id="systemDocContent" class="markdown-body"></div>
        </article>
      </div>
    </main>

    <script src="/static/system-docs.js?v=20260703-toc-v1"></script>
  </body>
</html>
